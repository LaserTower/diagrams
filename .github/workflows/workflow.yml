name: Upload Changed Files to AnythingLLM (with folder structure)

on:
  push:
    branches:
      - main

jobs:
  upload-documents:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: AnythingLLM   
    steps:
      - name: Debug - Check if secret exists
        run: |
            if [ -z "$ANYTHINGLLM_API_KEY" ]; then
              echo "Secret is empty or not set"
            else
              echo "Secret is set (first few chars): ${ANYTHINGLLM_API_KEY:0:4}..."
            fi
        env:
            ANYTHINGLLM_API_KEY: ${{ secrets.ANYTHINGLLM_API_KEY }}
            
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Sync files
        id: changed-files
        run: |
          if [ -z "${{ secrets.ANYTHINGLLM_API_KEY }}" ]; then
            echo "Ошибка: API_TOKEN не установлен!"
            exit 1
          fi
          
          API_TOKEN="${{ secrets.ANYTHINGLLM_API_KEY }}"
          for file in $(git diff --name-only HEAD~1 HEAD); do
            filename=$(basename "$file")
            workplace=$(basename $(dirname "$file"))
            api_url="https://anythingllm.lasertower.ru/api/v1"
            echo "информация о workspace $workplace"
           
            json=$(curl -s $api_url/workspace/$workplace \
              -H "Authorization: Bearer ${API_TOKEN}" \
              --fail-with-body)

            delete_file=$(echo "$json" | jq --arg filename "$filename" '.workspace[0].documents[] | select(.metadata | fromjson.title == $filename).filename')
              if [ -n "$delete_file" ]; then
              echo "удаляем существующий файл"
               curl -s -X POST $api_url/system/remove-documents \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${API_TOKEN}" \
              -d "{\"names\": [\"$delete_file\"]}"> /dev/null 2>&1 

                echo "Удаляю embedding $delete_file"
                curl -s -X POST $api_url/workspace/$workplace/update-embeddings \
                -H "Content-Type: application/json" \
                -H "Authorization: Bearer ${API_TOKEN}" \
                -d "{\"deletes\": [\"$delete_file\"]}" > /dev/null 2>&1
              fi

              
             echo "Загружаем файл  $file"
              if ! json=$(curl -s -X POST "$api_url/document/upload/$workplace" \
                            -H "Authorization: Bearer ${API_TOKEN}" \
                            -F "file=@$file" \
                            --fail-with-body 2>&1); then
                  echo "Ошибка при загрузке файла через curl: $json" >&2
                  exit 1
              fi
              
              # Проверяем, что ответ содержит валидный JSON
              if ! echo "$json" | jq -e . >/dev/null 2>&1; then
                  echo "Ошибка: получен невалидный JSON от сервера" >&2
                  echo "Ответ сервера: $json" >&2
                  exit 1
              fi
              
              # Извлекаем location
              location=$(echo "$json" | jq -r '.documents[0].location')
              
              # Проверяем, что location не пустой и не равен null
              if [ -z "$location" ] || [ "$location" = "null" ]; then
                  echo "Ошибка: поле location не найдено в ответе сервера" >&2
                  echo "Полученный JSON: $json" >&2
                  exit 1
              fi


              echo "Новый embedding $delete_emb"
              curl -s -X POST $api_url/workspace/$workplace/update-embeddings \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${API_TOKEN}" \
              -d "{\"adds\": [\"$location\"]}"> /dev/null 2>&1 
          done
